name: Build scrcpy-mobile iOS
on:
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # 【新增的破局神抽】：强制降级并锁定 CMake 到 3.x 时代，完美兼容老代码
      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.29.6'

      - name: Install dependencies
        run: |
          # 1. 安装基础依赖
          brew install ffmpeg sdl2 golang fmt pkg-config
          
          # 2. 下载并配置 Protoc 28.3 (官方压缩包里其实已经包含了 CMake 需要的 include 头文件)
          curl -LO https://github.com/protocolbuffers/protobuf/releases/download/v28.3/protoc-28.3-osx-aarch_64.zip
          unzip protoc-28.3-osx-aarch_64.zip -d $HOME/protoc_env
          
          # 3. 将 Protobuf 的路径显式告诉 CMake，完美解决 "missing: Protobuf_INCLUDE_DIR"
          export PATH="$HOME/protoc_env/bin:$PATH"
          export Protobuf_ROOT="$HOME/protoc_env"
          export Protobuf_INCLUDE_DIR="$HOME/protoc_env/include"
          echo "$HOME/protoc_env/bin" >> $GITHUB_PATH
          
          # 4. 提前建好所有的目标目录，解决 "No such file or directory" 的拷贝报错
          mkdir -p libs/iphoneos/arm64
          mkdir -p libs/iphonesimulator/arm64
          mkdir -p libs/iphonesimulator/x86_64
          
          # 5. 正式执行编译
          make libs
          make -C porting scrcpy-server

      - name: Build iOS App
        run: |
          xcodebuild clean build \
            -project scrcpy-ios/scrcpy-ios.xcodeproj \
            -scheme "scrcpy-ios" \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package to IPA
        run: |
          mkdir -p Payload
          mv scrcpy-ios/build/Release-iphoneos/scrcpy-ios.app Payload/
          zip -r scrcpy-mobile.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: scrcpy-mobile-ipa
          path: scrcpy-mobile.ipa
