name: Build scrcpy-mobile iOS
on:
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # 【新增的破局神抽】：强制降级并锁定 CMake 到 3.x 时代，完美兼容老代码
      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.29.6'

      - name: Install dependencies
        run: |
          # 1. 安装基础依赖，加入 fmt 和 protobuf（提供底层库以防 CMake 报错）
          brew install ffmpeg sdl2 golang fmt pkg-config protobuf
          
          # 2. 下载官方的 Protoc 28.3 二进制包
          curl -LO https://github.com/protocolbuffers/protobuf/releases/download/v28.3/protoc-28.3-osx-aarch_64.zip
          unzip protoc-28.3-osx-aarch_64.zip -d $HOME/protoc_env
          
          # 3. 环境变量“偷梁换柱”：把 28.3 放在系统最优先的位置，同时告诉 CMake 去哪里找头文件
          export PATH="$HOME/protoc_env/bin:$PATH"
          export CMAKE_PREFIX_PATH="$HOME/protoc_env"
          echo "$HOME/protoc_env/bin" >> $GITHUB_PATH
          
          # 4. 暴力修复 Submodule 报错：全局修改源码包里的所有脚本，强制覆盖 Git 更改
          find . -type f -name "*.sh" -exec sed -i '' 's/git checkout /git checkout -f /g' {} +
          find . -type f -name "*.sh" -exec sed -i '' 's/git submodule update/git submodule update --force/g' {} +
          
          # 5. 提前创建好所有需要的归档目录，解决 cp 报错
          mkdir -p libs/iphoneos/arm64
          mkdir -p libs/iphonesimulator/arm64
          mkdir -p libs/iphonesimulator/x86_64
          mkdir -p output/iphoneos/arm64
          mkdir -p output/iphonesimulator/arm64
          mkdir -p output/iphonesimulator/x86_64
          
          # 6. 正式执行编译
          make libs
          make -C porting scrcpy-server

      - name: Build iOS App
        run: |
          xcodebuild clean build \
            -project scrcpy-ios/scrcpy-ios.xcodeproj \
            -scheme "scrcpy-ios" \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package to IPA
        run: |
          mkdir -p Payload
          mv scrcpy-ios/build/Release-iphoneos/scrcpy-ios.app Payload/
          zip -r scrcpy-mobile.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: scrcpy-mobile-ipa
          path: scrcpy-mobile.ipa
