name: Build scrcpy-mobile iOS
on:
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          # 1. 安装基础依赖
          brew install ffmpeg sdl2 golang
          
          # 2. 安全卸载：先判断系统里有没有装 protobuf，如果有才执行 unlink，防止报错卡死
          if brew list protobuf &>/dev/null; then brew unlink protobuf; fi
          
          # 3. 绝对路径安装：使用 $(pwd) 获取当前绝对路径，Homebrew 绝不会再解析错
          brew install $(pwd)/porting/protobuf.rb
          
          # 4. 继续执行原有的编译指令
          make libs
          make -C porting scrcpy-server

      - name: Build iOS App
        run: |
          # 调用 Xcode 工具链进行无签名编译
          xcodebuild clean build \
            -project scrcpy-ios/scrcpy-ios.xcodeproj \
            -scheme "scrcpy-ios" \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package to IPA
        run: |
          # 将编译出的 .app 封装为 .ipa
          mkdir -p Payload
          mv scrcpy-ios/build/Release-iphoneos/scrcpy-ios.app Payload/
          zip -r scrcpy-mobile.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: scrcpy-mobile-ipa
          path: scrcpy-mobile.ipa
