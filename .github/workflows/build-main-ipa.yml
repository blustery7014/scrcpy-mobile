name: Build scrcpy-mobile iOS
于:
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          # 1. 安装基础依赖
          brew install ffmpeg sdl2 golang
          
          # 2. 针对报错，解绑系统可能自带的旧版 protobuf，并强制安装项目指定的版本
          brew unlink protobuf || true
          brew install porting/protobuf.rb
          
          # 3. 继续执行原有的编译指令
          make libs
          make -C porting scrcpy-server

      - name: Build iOS App
        run: |
          # 调用 Xcode 工具链进行无签名编译
          xcodebuild clean build \
            -project scrcpy-ios/scrcpy-ios.xcodeproj \
            -scheme "scrcpy-ios" \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package to IPA
        run: |
          # 将编译出的 .app 封装为 .ipa
          mkdir -p Payload
          mv scrcpy-ios/build/Release-iphoneos/scrcpy-ios.app Payload/
          zip -r scrcpy-mobile.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: scrcpy-mobile-ipa
          path: scrcpy-mobile.ipa
