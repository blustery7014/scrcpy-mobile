name: Build scrcpy-mobile iOS
on:
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          # 1. 安装不受影响的基础依赖
          brew install ffmpeg sdl2 golang
          
          # 2. 绕过 Homebrew 限制，直接从 Google 官方下载所需的 protoc 28.3 二进制文件
          curl -LO https://github.com/protocolbuffers/protobuf/releases/download/v28.3/protoc-28.3-osx-aarch_64.zip
          unzip protoc-28.3-osx-aarch_64.zip -d $HOME/protoc_env
          
          # 3. 将下载好的工具注入到当前和后续步骤的环境变量中
          export PATH="$HOME/protoc_env/bin:$PATH"
          echo "$HOME/protoc_env/bin" >> $GITHUB_PATH
          
          # 验证版本是否符合作者要求
          protoc --version
          
          # 4. 继续执行项目原本的编译指令
          make libs
          make -C porting scrcpy-server

      - name: Build iOS App
        run: |
          # 调用 Xcode 工具链进行无签名编译
          xcodebuild clean build \
            -project scrcpy-ios/scrcpy-ios.xcodeproj \
            -scheme "scrcpy-ios" \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package to IPA
        run: |
          # 将编译出的 .app 封装为 .ipa
          mkdir -p Payload
          mv scrcpy-ios/build/Release-iphoneos/scrcpy-ios.app Payload/
          zip -r scrcpy-mobile.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: scrcpy-mobile-ipa
          path: scrcpy-mobile.ipa
